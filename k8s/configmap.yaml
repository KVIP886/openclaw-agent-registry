# Agent Registry - Kubernetes ConfigMap
# Version: 1.0.0
# Date: 2026-04-10 (Week 5 Day 5)

apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-registry-config
  labels:
    app: agent-registry
data:
  # Application Configuration
  NODE_ENV: "production"
  PORT: "1111"
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
  
  # Database Configuration
  DB_HOST: "postgres-db"
  DB_PORT: "5432"
  DB_NAME: "agent_registry"
  DB_USER: "postgres"
  DB_MAX_CONNECTIONS: "20"
  DB_IDLE_TIMEOUT: "30000"
  DB_CONNECT_TIMEOUT: "2000"
  
  # JWT Configuration
  JWT_EXPIRES_IN: "24h"
  JWT_REFRESH_EXPIRES_IN: "7d"
  
  # CORS Configuration
  CORS_ORIGIN: "http://localhost:3000"
  CORS_METHODS: "GET,POST,PUT,DELETE"
  
  # Feature Flags
  FEATURE_AUTH_ENABLED: "true"
  FEATURE_RBAC_ENABLED: "true"
  FEATURE_AUDIT_LOGGING_ENABLED: "true"
  FEATURE_VERSION_CONTROL_ENABLED: "true"
  FEATURE_CONFLICT_RESOLUTION_ENABLED: "true"
  FEATURE_EVENT_SUBSCRIPTION_ENABLED: "true"
  
  # Monitoring
  METRICS_ENABLED: "true"
  METRICS_PORT: "9090"
  TRACING_ENABLED: "false"
  
  # File Paths
  LOG_DIR: "/app/logs"
  DATA_DIR: "/app/data"
  
  # Performance Tuning
  MAX_PAYLOAD_SIZE: "10mb"
  REQUEST_TIMEOUT: "30000"
  CONNECTION_POOL_MAX: "20"
  CONNECTION_POOL_IDLE_TIMEOUT: "30000"
  
  # Backup Configuration
  BACKUP_ENABLED: "true"
  BACKUP_DIR: "/app/backups"
  BACKUP_SCHEDULE: "0 3 * * *"
  
  # Redis Configuration (Optional)
  REDIS_ENABLED: "false"
  REDIS_HOST: "redis-cache"
  REDIS_PORT: "6379"
  
  # Health Check
  HEALTH_CHECK_ENABLED: "true"
  HEALTH_CHECK_INTERVAL: "30"
  HEALTH_CHECK_TIMEOUT: "10"
  
  # API Configuration
  API_VERSION: "v1"
  API_PREFIX: "/api"
  
  # Rate Limiting (Optional)
  RATE_LIMIT_ENABLED: "false"
  RATE_LIMIT_MAX: "100"
  RATE_LIMIT_WINDOW: "60000"

---

# ============================================
# ConfigMap: Application Logs
# ============================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-registry-logs
  labels:
    app: agent-registry
data:
  log_rotation: "7d"
  log_max_size: "10m"
  log_max_files: "5"
  log_format: "json"

---

# ============================================
# ConfigMap: Application Monitoring
# ============================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-registry-monitoring
  labels:
    app: agent-registry
data:
  prometheus_enabled: "true"
  prometheus_port: "9090"
  prometheus_path: "/metrics"
  tracing_enabled: "false"
  tracing_endpoint: ""
  metrics_retention_days: "30"
