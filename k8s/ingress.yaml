# Agent Registry - Kubernetes Ingress
# Version: 1.0.0
# Date: 2026-04-10 (Week 5 Day 5)

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agent-registry
  labels:
    app: agent-registry
  annotations:
    # Nginx Ingress Controller annotations
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    
    # Rate limiting
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    
    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
    
    # SSL configuration
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    
    # Load balancing
    nginx.ingress.kubernetes.io/load-balance: "roundrobin"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$binary_remote_addr"
    
    # Custom headers
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/use-regex: "true"

spec:
  # TLS configuration
  tls:
  - hosts:
    - agent-registry.example.com
    - api.agent-registry.example.com
    secretName: agent-registry-tls
  
  # Rules
  rules:
  # Main domain
  - host: agent-registry.example.com
    http:
      paths:
      # API endpoint
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: agent-registry
            port:
              number: 1111
      
      # UI endpoint
      - path: /
        pathType: Prefix
        backend:
          service:
            name: agent-registry
            port:
              number: 1111
  
  # API subdomain
  - host: api.agent-registry.example.com
    http:
      paths:
      - path: /api/v1
        pathType: Prefix
        backend:
          service:
            name: agent-registry
            port:
              number: 1111

---

# ============================================
# Ingress: Nginx Controller Configuration
# ============================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agent-registry-nginx-config
  labels:
    app: agent-registry
  annotations:
    # Connection settings
    nginx.ingress.kubernetes.io/proxy-buffering: "on"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
    
    # SSL settings
    nginx.ingress.kubernetes.io/ssl-protocol: "TLSv1.2,TLSv1.3"
    nginx.ingress.kubernetes.io/ssl-ciphers: "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256"
    
    # Health check
    nginx.ingress.kubernetes.io/health-check: "true"
    nginx.ingress.kubernetes.io/health-check-path: "/api/health"
    nginx.ingress.kubernetes.io/health-check-timeout: "5"
    
    # Timeout configuration
    nginx.ingress.kubernetes.io/client-body-timeout: "30"
    nginx.ingress.kubernetes.io/client-body-buffer-size: "10m"
    
    # Custom responses
    nginx.ingress.kubernetes.io/custom-responses: |
      {
        "404": {
          "body": "API endpoint not found",
          "status": "404"
        },
        "503": {
          "body": "Service temporarily unavailable",
          "status": "503"
        }
      }

spec:
  rules:
  - host: agent-registry.example.com
    http:
      paths:
      - path: /health
        pathType: ImplementationSpecific
        backend:
          service:
            name: agent-registry
            port:
              number: 1111

---

# ============================================
# Ingress: Cert-Manager SSL Certificate
# ============================================

apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: agent-registry-tls
  labels:
    app: agent-registry
spec:
  secretName: agent-registry-tls
  duration: 2160h # 90 days
  renewBefore: 360h # 15 days before expiry
  commonName: agent-registry.example.com
  isCA: false
  privateKey:
    algorithm: RSA
    size: 2048
  usages:
    - server auth
    - client auth
  dnsNames:
  - agent-registry.example.com
  - api.agent-registry.example.com
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
    group: cert-manager.io

---

# ============================================
# Ingress: ClusterIssuer (Let's Encrypt)
# ============================================

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@example.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
    - http01:
        ingress:
          class: nginx
