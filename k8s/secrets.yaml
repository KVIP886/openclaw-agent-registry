# Agent Registry - Kubernetes Secrets
# Version: 1.0.0
# Date: 2026-04-10 (Week 5 Day 5)
# IMPORTANT: Generate these values before deployment!

apiVersion: v1
kind: Secret
metadata:
  name: agent-registry-secrets
  labels:
    app: agent-registry
type: Opaque
stringData:
  # Database Credentials (generate secure passwords)
  DB_PASSWORD: "your-secure-database-password"
  
  # JWT Secrets (generate strong random strings)
  JWT_SECRET: "your-super-secret-jwt-key-change-in-production"
  JWT_REFRESH_SECRET: "your-super-secret-refresh-key-change-in-production"
  
  # Redis Password (if enabled)
  REDIS_PASSWORD: ""
  
  # API Keys (if needed)
  API_KEY: "your-api-key-here"
  
  # SSL/TLS Certificates (if using HTTPS)
  # TLS_CERT: |
  #   -----BEGIN CERTIFICATE-----
  #   ...
  #   -----END CERTIFICATE-----
  # TLS_KEY: |
  #   -----BEGIN PRIVATE KEY-----
  #   ...
  #   -----END PRIVATE KEY-----

---

# ============================================
# Secret: Database Backup Credentials
# ============================================

apiVersion: v1
kind: Secret
metadata:
  name: agent-registry-db-backup
  labels:
    app: agent-registry
type: Opaque
stringData:
  # Backup storage credentials (AWS S3, Azure Blob, etc.)
  BACKUP_S3_KEY: "your-s3-access-key"
  BACKUP_S3_SECRET: "your-s3-secret-key"
  BACKUP_AZURE_KEY: "your-azure-key"
  BACKUP_AZURE_SECRET: "your-azure-secret"

---

# ============================================
# Secret: Monitoring Credentials
# ============================================

apiVersion: v1
kind: Secret
metadata:
  name: agent-registry-monitoring
  labels:
    app: agent-registry
type: Opaque
stringData:
  # Monitoring service credentials
  DATADOG_API_KEY: "your-datadog-api-key"
  NEW_RELIC_LICENSE_KEY: "your-newrelic-license"
  SENTRY_DSN: "your-sentry-dsn"
