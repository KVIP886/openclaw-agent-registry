# Agent Registry - Kubernetes Deployment
# Version: 1.0.0
# Date: 2026-04-10 (Week 5 Day 5)
# Cluster: Production Kubernetes Cluster

apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-registry
  labels:
    app: agent-registry
    version: "1.0.0"
    environment: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: agent-registry
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: agent-registry
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      # Security: Run as non-root user
      runAsUser: 1001
      runAsGroup: 1001
      fsGroup: 1001
      
      # Node scheduling
      nodeSelector:
        kubernetes.io/os: linux
      
      # Pod anti-affinity for better distribution
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: agent-registry
              topologyKey: kubernetes.io/hostname
      
      # Service account
      serviceAccountName: agent-registry
      
      # Containers
      containers:
      - name: agent-registry
        image: openclaw/agent-registry:latest
        imagePullPolicy: Always
        
        # Ports
        ports:
        - name: http
          containerPort: 1111
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        
        # Environment variables from ConfigMap and Secret
        envFrom:
        - configMapRef:
            name: agent-registry-config
        - secretRef:
            name: agent-registry-secrets
        
        # Environment overrides
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "1111"
        - name: LOG_LEVEL
          value: "info"
        
        # Resource limits and requests
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
        
        # Liveness probe
        livenessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
          successThreshold: 1
        
        # Readiness probe
        readinessProbe:
          httpGet:
            path: /api/ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
          successThreshold: 1
        
        # Startup probe (for slow starts)
        startupProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
        
        # Volume mounts
        volumeMounts:
        - name: logs
          mountPath: /app/logs
        - name: data
          mountPath: /app/data
        - name: tmp
          mountPath: /tmp
        
        # Security context
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1001
          runAsGroup: 1001
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
              - ALL
      
      # Init containers (database readiness)
      initContainers:
      - name: db-check
        image: postgres:15-alpine
        command: ['sh', '-c', 'until nc -z postgres-db 5432; do echo "Waiting for postgres..."; sleep 2; done; echo "PostgreSQL is ready"']
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
      
      # Volumes
      volumes:
      - name: logs
        emptyDir: {}
      - name: data
        emptyDir: {}
      - name: tmp
        emptyDir: {}
      
      # Graceful shutdown
      terminationGracePeriodSeconds: 30

---
